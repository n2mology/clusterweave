# Local two-face web setup for final public/reviewer UI checks.
#
# This file intentionally defines web faces only. Keep the original
# `clusterweave-worker` container running as the single backend worker against
# the original shared Docker volumes.
#
# Dev/QA face: http://127.0.0.1:18080/
# Public face: http://127.0.0.1:18081/
#
# Both faces use public-mode auth so the diagnostics access code unlocks the
# reviewer/admin controls without changing the UI build.

x-web-env: &web-env
  SERVICE_MODE: web
  DATA_DIR: /data
  ANTISMASH_DB_DIR: /databases/antismash
  PFAM_DIR: /databases/pfam
  PORT: "8080"
  CLUSTERWEAVE_PUBLIC_MODE: "1"
  CLUSTERWEAVE_SUBMISSIONS_OPEN: "${CLUSTERWEAVE_SUBMISSIONS_OPEN:-1}"
  CLUSTERWEAVE_SUBMIT_TOKEN: "${CLUSTERWEAVE_SUBMIT_TOKEN:-}"
  CLUSTERWEAVE_ADMIN_TOKEN: "${CLUSTERWEAVE_ADMIN_TOKEN:-dev-admin}"
  CLUSTERWEAVE_JOB_TOKEN_SECRET: "${CLUSTERWEAVE_JOB_TOKEN_SECRET:-dev-change-me}"
  CLUSTERWEAVE_SMTP_ENABLED: "${CLUSTERWEAVE_SMTP_ENABLED:-0}"
  CLUSTERWEAVE_SMTP_HOST: "${CLUSTERWEAVE_SMTP_HOST:-}"
  CLUSTERWEAVE_SMTP_PORT: "${CLUSTERWEAVE_SMTP_PORT:-587}"
  CLUSTERWEAVE_SMTP_USERNAME: "${CLUSTERWEAVE_SMTP_USERNAME:-}"
  CLUSTERWEAVE_SMTP_PASSWORD: "${CLUSTERWEAVE_SMTP_PASSWORD:-}"
  CLUSTERWEAVE_SMTP_FROM: "${CLUSTERWEAVE_SMTP_FROM:-}"
  CLUSTERWEAVE_SMTP_TLS: "${CLUSTERWEAVE_SMTP_TLS:-1}"
  CLUSTERWEAVE_SMTP_OUTBOX_DIR: "${CLUSTERWEAVE_SMTP_OUTBOX_DIR:-}"

x-web-face: &web-face
  build:
    context: .
    dockerfile: Dockerfile.web
  image: clusterweave-web:latest
  restart: unless-stopped
  volumes:
    - clusterweave_antismash_db:/databases/antismash
    - clusterweave_pfam_db:/databases/pfam
    - clusterweave_job_data:/data
  environment: *web-env
  mem_limit: 2g
  shm_size: 512m
  tmpfs:
    - /tmp:size=4g
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:8080/"]
    interval: 30s
    timeout: 10s
    retries: 5
    start_period: 60s

services:
  dev-web:
    <<: *web-face
    container_name: clusterweave-dev-web
    ports:
      - "18080:8080"
    environment:
      <<: *web-env
      CLUSTERWEAVE_PUBLIC_BASE_URL: "http://127.0.0.1:18080/"

  public-web:
    <<: *web-face
    container_name: clusterweave-public-web
    ports:
      - "18081:8080"
    environment:
      <<: *web-env
      CLUSTERWEAVE_PUBLIC_BASE_URL: "http://127.0.0.1:18081/"

volumes:
  clusterweave_antismash_db:
    external: true
  clusterweave_pfam_db:
    external: true
  clusterweave_job_data:
    external: true
