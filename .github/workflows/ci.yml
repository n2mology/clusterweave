name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Check Python syntax
        run: |
          python -B - <<'PY'
          from pathlib import Path
          import sys

          ok = True
          for path in list(Path("bin").glob("*.py")) + list(Path("tests").glob("*.py")):
              try:
                  compile(path.read_text(encoding="utf-8"), str(path), "exec")
              except SyntaxError as exc:
                  ok = False
                  print(f"{path}:{exc.lineno}:{exc.offset}: {exc.msg}")

          if not ok:
              sys.exit(1)
          PY

      - name: Check shell syntax
        shell: bash
        run: |
          set -euo pipefail
          for file in *.sh scripts/ncbi/*.sh Software/funbgcex/*.sh; do
            [ -e "$file" ] || continue
            bash -n "$file"
          done
