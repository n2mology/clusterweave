name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install browser test dependency
        run: npm ci

      - name: Check Python syntax
        run: |
          python -B - <<'PY'
          from pathlib import Path
          import sys

          paths = [*Path("bin").glob("*.py"), *Path("tests").glob("*.py"), *Path("web").glob("*.py")]
          failed = False
          for path in paths:
              try:
                  compile(path.read_text(encoding="utf-8"), str(path), "exec")
              except SyntaxError as exc:
                  failed = True
                  print(f"{path}:{exc.lineno}:{exc.offset}: {exc.msg}")
          if failed:
              sys.exit(1)
          PY

      - name: Check shell syntax
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            bash -n "$file"
          done < <(find . -maxdepth 4 -type f -name '*.sh' -not -path './.git/*' -print0)

      - name: Check JavaScript syntax
        run: |
          node --check web/static/assets/clusterweave.js
          node --check tests/browser/result_html_bundle.spec.js
          node --check tests/browser/playwright.config.js

      - name: Validate compose profiles
        run: |
          docker compose config --quiet
          docker compose -f clusterweave.yml config --quiet

      - name: Check public release safety and links
        run: python3 -B bin/check_public_release.py

      - name: Run unit tests
        run: python3 -B -m unittest discover -s tests -p 'test_*.py'

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser fixtures
        run: npm run test:browser
