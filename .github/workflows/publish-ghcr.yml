name: Publish Containers

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: web
            dockerfile: Dockerfile.web
          - service: worker
            dockerfile: Dockerfile.worker

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set lowercase owner
        id: prep
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER}"
          echo "owner_lc=${owner,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.prep.outputs.owner_lc }}/clusterweave-${{ matrix.service }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true

      - name: Print published image tags
        run: |
          echo "Published ghcr.io/${{ steps.prep.outputs.owner_lc }}/clusterweave-${{ matrix.service }}"
          echo "Tags:"
          echo "${{ steps.meta.outputs.tags }}"
