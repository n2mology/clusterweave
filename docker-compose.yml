# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — ClusterWeave Web
#
# Usage:
#   ./bin/init_local_instance.sh       # one-time local secrets/configuration
#   docker compose up --build -d       # first run (builds image, downloads DBs)
#   docker compose up -d               # subsequent runs (detached)
#   docker compose down                # stop
#   docker compose logs -f web         # tail logs
#
# The web UI is available at http://127.0.0.1:8080 by default.
#
# This is the trusted single-user local-analysis profile. It mounts the Docker
# socket so the worker can launch pinned sibling tool containers. Keep it bound
# to loopback and do not expose it as an unaudited public service.
#
# On first startup the container downloads:
#   - antiSMASH databases (~5 GB) to the `antismash_db` volume
#   - Pfam-A.hmm (~1 GB) to the `pfam_db` volume
# Both are cached in named Docker volumes and reused on subsequent starts.
# ─────────────────────────────────────────────────────────────────────────────
services:
  web:
    platform: "${CLUSTERWEAVE_DOCKER_PLATFORM:-linux/amd64}"
    build:
      context: .
      dockerfile: Dockerfile.web
    image: clusterweave-web:latest
    container_name: clusterweave-web
    restart: unless-stopped
    ports:
      - "${CLUSTERWEAVE_BIND_ADDRESS:-127.0.0.1}:${HOST_PORT:-8080}:8080"
    volumes:
      # Persistent database caches (survive container restarts / rebuilds)
      - antismash_db:/databases/antismash
      - pfam_db:/databases/pfam
      # Persistent job data (uploads and results)
      - job_data:/data
    environment:
      SERVICE_MODE: web
      DATA_DIR: /data
      ANTISMASH_DB_DIR: /databases/antismash
      PFAM_DIR: /databases/pfam
      PORT: "8080"
      # Public-service access model. These are host-env pass-throughs so
      # deployment secrets and launch policy stay outside source.
      CLUSTERWEAVE_PUBLIC_MODE: "${CLUSTERWEAVE_PUBLIC_MODE:-1}"
      CLUSTERWEAVE_SUBMISSIONS_OPEN: "${CLUSTERWEAVE_SUBMISSIONS_OPEN:-1}"
      CLUSTERWEAVE_SUBMIT_TOKEN: "${CLUSTERWEAVE_SUBMIT_TOKEN:-}"
      CLUSTERWEAVE_ADMIN_TOKEN: "${CLUSTERWEAVE_ADMIN_TOKEN:-}"
      CLUSTERWEAVE_SUBMIT_TOKEN_SHA256: "${CLUSTERWEAVE_SUBMIT_TOKEN_SHA256:-}"
      CLUSTERWEAVE_ADMIN_TOKEN_SHA256: "${CLUSTERWEAVE_ADMIN_TOKEN_SHA256:-}"
      CLUSTERWEAVE_ALLOW_ENV_OVERRIDES: "${CLUSTERWEAVE_ALLOW_ENV_OVERRIDES:-0}"
      CLUSTERWEAVE_ALLOWED_ORIGINS: "${CLUSTERWEAVE_ALLOWED_ORIGINS:-}"
      CLUSTERWEAVE_JOB_RETENTION_DAYS: "${CLUSTERWEAVE_JOB_RETENTION_DAYS:-30}"
      CLUSTERWEAVE_ALLOW_NEVER_EXPIRE_JOBS: "${CLUSTERWEAVE_ALLOW_NEVER_EXPIRE_JOBS:-0}"
      CLUSTERWEAVE_MAX_ACCESSIONS: "${CLUSTERWEAVE_MAX_ACCESSIONS:-50}"
      CLUSTERWEAVE_MAX_GENOME_FILES: "${CLUSTERWEAVE_MAX_GENOME_FILES:-50}"
      CLUSTERWEAVE_MAX_UPLOAD_FILE_MB: "${CLUSTERWEAVE_MAX_UPLOAD_FILE_MB:-500}"
      CLUSTERWEAVE_MAX_UPLOAD_TOTAL_MB: "${CLUSTERWEAVE_MAX_UPLOAD_TOTAL_MB:-1024}"
      CLUSTERWEAVE_MAX_UPLOAD_BODY_OVERHEAD_MB: "${CLUSTERWEAVE_MAX_UPLOAD_BODY_OVERHEAD_MB:-16}"
      CLUSTERWEAVE_MAX_CONCURRENT_UPLOADS: "${CLUSTERWEAVE_MAX_CONCURRENT_UPLOADS:-2}"
      CLUSTERWEAVE_UPLOAD_STAGING_DIR: "/data/.upload_staging"
      CLUSTERWEAVE_MAX_QUEUED_JOBS: "${CLUSTERWEAVE_MAX_QUEUED_JOBS:-50}"
      CLUSTERWEAVE_MAX_CPUS_PER_JOB: "${CLUSTERWEAVE_MAX_CPUS_PER_JOB:-4}"
      # Submission floor and conservative public execution shape. The web
      # planner clamps every stage so its peak CPU demand fits the job budget.
      CLUSTERWEAVE_MIN_FREE_DISK_GB: "${CLUSTERWEAVE_MIN_FREE_DISK_GB:-0}"
      CLUSTERWEAVE_PUBLIC_GENOME_PARALLELISM: "${CLUSTERWEAVE_PUBLIC_GENOME_PARALLELISM:-1}"
      CLUSTERWEAVE_PUBLIC_ANTISMASH_RECORD_PARALLELISM: "${CLUSTERWEAVE_PUBLIC_ANTISMASH_RECORD_PARALLELISM:-1}"
      CLUSTERWEAVE_PUBLIC_FUNANNOTATE_CPUS_PER_GENOME: "${CLUSTERWEAVE_PUBLIC_FUNANNOTATE_CPUS_PER_GENOME:-4}"
      CLUSTERWEAVE_PUBLIC_FUNBGCEX_WORKERS_PER_GENOME: "${CLUSTERWEAVE_PUBLIC_FUNBGCEX_WORKERS_PER_GENOME:-2}"
      # Optional completion/failure email. Supply real values through host env
      # or use CLUSTERWEAVE_SMTP_OUTBOX_DIR for local dry-run messages.
      CLUSTERWEAVE_PUBLIC_BASE_URL: "${CLUSTERWEAVE_PUBLIC_BASE_URL:-http://127.0.0.1:8080/}"
      CLUSTERWEAVE_JOB_TOKEN_SECRET: "${CLUSTERWEAVE_JOB_TOKEN_SECRET:-}"
      CLUSTERWEAVE_CITATION_URL: "${CLUSTERWEAVE_CITATION_URL:-}"
      CLUSTERWEAVE_SMTP_ENABLED: "${CLUSTERWEAVE_SMTP_ENABLED:-0}"
      CLUSTERWEAVE_SMTP_HOST: "${CLUSTERWEAVE_SMTP_HOST:-}"
      CLUSTERWEAVE_SMTP_PORT: "${CLUSTERWEAVE_SMTP_PORT:-587}"
      CLUSTERWEAVE_SMTP_USERNAME: "${CLUSTERWEAVE_SMTP_USERNAME:-}"
      CLUSTERWEAVE_SMTP_PASSWORD: "${CLUSTERWEAVE_SMTP_PASSWORD:-}"
      CLUSTERWEAVE_SMTP_FROM: "${CLUSTERWEAVE_SMTP_FROM:-}"
      CLUSTERWEAVE_SMTP_TLS: "${CLUSTERWEAVE_SMTP_TLS:-1}"
      CLUSTERWEAVE_SMTP_SSL: "${CLUSTERWEAVE_SMTP_SSL:-0}"
      CLUSTERWEAVE_SMTP_OUTBOX_DIR: "${CLUSTERWEAVE_SMTP_OUTBOX_DIR:-}"
    mem_limit: 2g
    shm_size: 512m
    tmpfs:
      - /tmp:size=4g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  worker:
    platform: "${CLUSTERWEAVE_DOCKER_PLATFORM:-linux/amd64}"
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: clusterweave-worker:latest
    container_name: clusterweave-worker
    restart: unless-stopped
    volumes:
      - antismash_db:/databases/antismash
      - pfam_db:/databases/pfam
      - job_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      SERVICE_MODE: worker
      DATA_DIR: /data
      ANTISMASH_DB_DIR: /databases/antismash
      PFAM_DIR: /databases/pfam
      CLUSTERWEAVE_ROOT: /clusterweave
      CLUSTERWEAVE_SOFTWARE_ROOT: /data/software
      CLUSTERWEAVE_RUNTIME_MODE: lab-docker
      CLUSTERWEAVE_ENABLE_DOCKER_SOCKET: "1"
      ENGINE: docker
      DOCKER_DEFAULT_PLATFORM: "${CLUSTERWEAVE_DOCKER_PLATFORM:-linux/amd64}"
      DOCKER_DATA_VOLUME: clusterweave_job_data
      DOCKER_ANTISMASH_DB_VOLUME: clusterweave_antismash_db
      DOCKER_PFAM_VOLUME: clusterweave_pfam_db
      WORKER_POLL_SECONDS: "1"
      PREPULL_FUNBGCEX_IMAGE: "1"
      AUTO_BUILD_FUNBGCEX_DOCKER: "1"
      AUTO_INSTALL_NCBI_CLI: "${AUTO_INSTALL_NCBI_CLI:-1}"
      NCBI_CLI_ROOT: "${NCBI_CLI_ROOT:-/data/software/ncbi_cli}"
      FUNBGCEX_USE_DOCKER_IMAGE: "1"
      FUNBGCEX_DOCKER_IMAGE: "clusterweave-funbgcex:latest"
      PREPULL_CLINKER_IMAGE: "1"
      PREPULL_BIGSCAPE_IMAGE: "1"
      BIGSCAPE_USE_DOCKER_IMAGE: "1"
      BIGSCAPE_DOCKER_IMAGE: "ghcr.io/medema-group/big-scape:2.0.0-beta.6"
      BIGSCAPE_DOCKER_DATA_VOLUME: "clusterweave_job_data"
      BIGSCAPE_DOCKER_PFAM_VOLUME: "clusterweave_pfam_db"
      CLINKER_USE_DOCKER_IMAGE: "1"
      CLINKER_DOCKER_IMAGE: "quay.io/biocontainers/clinker-py:0.0.32--pyhdfd78af_0"
      CLINKER_DOCKER_DATA_VOLUME: "clusterweave_job_data"
      NPLINKER_USE_DOCKER_IMAGE: "1"
      NPLINKER_DOCKER_IMAGE: "python:3.11-slim"
      NPLINKER_DOCKER_DATA_VOLUME: "clusterweave_job_data"
      # The normal taxonomy/BGC/GCF figure is dependency-light and enabled.
      # Sequence inference/cross-kingdom context remain explicit opt-ins.
      RUN_TAXON_TREE_FIGURE: "${RUN_TAXON_TREE_FIGURE:-1}"
      PHYLOGENY_MAX_VISIBLE_ARCS: "${PHYLOGENY_MAX_VISIBLE_ARCS:-80}"
      RUN_PHYLOGENY: "${RUN_PHYLOGENY:-0}"
      PHYLOGENY_REQUIRED: "${PHYLOGENY_REQUIRED:-0}"
      PHYLOGENY_CPUS: "${PHYLOGENY_CPUS:-1}"
      PHYLOGENY_PARALLELISM: "${PHYLOGENY_PARALLELISM:-1}"
      PHYLOGENY_MAX_FAMILIES: "${PHYLOGENY_MAX_FAMILIES:-10}"
      PHYLOGENY_MAX_SEQUENCES_PER_FAMILY: "${PHYLOGENY_MAX_SEQUENCES_PER_FAMILY:-250}"
      PHYLOGENY_MAX_INPUT_BYTES: "${PHYLOGENY_MAX_INPUT_BYTES:-262144000}"
      PHYLOGENY_MAX_ALIGNMENT_BYTES: "${PHYLOGENY_MAX_ALIGNMENT_BYTES:-50000000}"
      PHYLOGENY_TIMEOUT_SECONDS: "${PHYLOGENY_TIMEOUT_SECONDS:-7200}"
      PHYLOGENY_RETAIN_SCRATCH: "${PHYLOGENY_RETAIN_SCRATCH:-0}"
      PHYLOGENY_RUNTIME: "${PHYLOGENY_RUNTIME:-docker}"
      PHYLOGENY_DOCKER_IMAGE: "${PHYLOGENY_DOCKER_IMAGE:-clusterweave-phylogeny:1.0.0}"
      PHYLOGENY_SIF_PATH: "${PHYLOGENY_SIF_PATH:-/clusterweave/software/phylogeny/clusterweave_phylogeny_1.0.0.sif}"
      RUN_CROSS_KINGDOM_EVIDENCE: "${RUN_CROSS_KINGDOM_EVIDENCE:-${RUN_HGT_EVIDENCE:-0}}"
      WORKER_CONCURRENCY: "${WORKER_CONCURRENCY:-1}"
      WORKER_CPU_BUDGET: "${WORKER_CPU_BUDGET:-auto}"
      WORKER_MEMORY_BUDGET_MB: "${WORKER_MEMORY_BUDGET_MB:-auto}"
      WORKER_MIN_FREE_DISK_GB: "${WORKER_MIN_FREE_DISK_GB:-0}"
      WORKER_PENDING_RECOVERY_SECONDS: "${WORKER_PENDING_RECOVERY_SECONDS:-30}"
      WORKER_PENDING_RECOVERY_GRACE_SECONDS: "${WORKER_PENDING_RECOVERY_GRACE_SECONDS:-60}"
      WORKER_MEMORY_BASE_MB: "${WORKER_MEMORY_BASE_MB:-1024}"
      WORKER_MEMORY_PER_GENOME_MB: "${WORKER_MEMORY_PER_GENOME_MB:-2048}"
      WORKER_MEMORY_PER_ANTISMASH_SHARD_MB: "${WORKER_MEMORY_PER_ANTISMASH_SHARD_MB:-2048}"
      WORKER_MEMORY_PER_ANNOTATION_CPU_MB: "${WORKER_MEMORY_PER_ANNOTATION_CPU_MB:-256}"
      WORKER_MEMORY_PER_FUNBGCEX_WORKER_MB: "${WORKER_MEMORY_PER_FUNBGCEX_WORKER_MB:-128}"
      WORKER_MEMORY_PHYLOGENY_BASE_MB: "${WORKER_MEMORY_PHYLOGENY_BASE_MB:-1024}"
      WORKER_MEMORY_PER_PHYLOGENY_CPU_MB: "${WORKER_MEMORY_PER_PHYLOGENY_CPU_MB:-2048}"
      WORKER_MEMORY_SAFETY_FACTOR: "${WORKER_MEMORY_SAFETY_FACTOR:-1.25}"
      WORKER_MEMORY_MINIMUM_MB: "${WORKER_MEMORY_MINIMUM_MB:-2048}"
      PIPELINE_CPUS: "${PIPELINE_CPUS:-4}"
      PIPELINE_RESOURCE_MODE: "${PIPELINE_RESOURCE_MODE:-conservative}"
      ANTISMASH_RETAIN_SHARD_WORK: "${ANTISMASH_RETAIN_SHARD_WORK:-0}"
      CLUSTERWEAVE_TOOL_DOCKER_CPUS: "${CLUSTERWEAVE_TOOL_DOCKER_CPUS:-}"
      CLUSTERWEAVE_TOOL_DOCKER_MEMORY: "${CLUSTERWEAVE_TOOL_DOCKER_MEMORY:-}"
      CLUSTERWEAVE_TOOL_DOCKER_PIDS_LIMIT: "${CLUSTERWEAVE_TOOL_DOCKER_PIDS_LIMIT:-4096}"
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
      # Must match the web service so terminal notifications can issue valid
      # private result links.
      CLUSTERWEAVE_PUBLIC_BASE_URL: "${CLUSTERWEAVE_PUBLIC_BASE_URL:-http://127.0.0.1:8080/}"
      CLUSTERWEAVE_JOB_TOKEN_SECRET: "${CLUSTERWEAVE_JOB_TOKEN_SECRET:-}"
      CLUSTERWEAVE_JOB_RETENTION_DAYS: "${CLUSTERWEAVE_JOB_RETENTION_DAYS:-30}"
      CLUSTERWEAVE_ALLOW_NEVER_EXPIRE_JOBS: "${CLUSTERWEAVE_ALLOW_NEVER_EXPIRE_JOBS:-0}"
      CLUSTERWEAVE_CITATION_URL: "${CLUSTERWEAVE_CITATION_URL:-}"
      CLUSTERWEAVE_SMTP_ENABLED: "${CLUSTERWEAVE_SMTP_ENABLED:-0}"
      CLUSTERWEAVE_SMTP_HOST: "${CLUSTERWEAVE_SMTP_HOST:-}"
      CLUSTERWEAVE_SMTP_PORT: "${CLUSTERWEAVE_SMTP_PORT:-587}"
      CLUSTERWEAVE_SMTP_USERNAME: "${CLUSTERWEAVE_SMTP_USERNAME:-}"
      CLUSTERWEAVE_SMTP_PASSWORD: "${CLUSTERWEAVE_SMTP_PASSWORD:-}"
      CLUSTERWEAVE_SMTP_FROM: "${CLUSTERWEAVE_SMTP_FROM:-}"
      CLUSTERWEAVE_SMTP_TLS: "${CLUSTERWEAVE_SMTP_TLS:-1}"
      CLUSTERWEAVE_SMTP_SSL: "${CLUSTERWEAVE_SMTP_SSL:-0}"
      CLUSTERWEAVE_SMTP_OUTBOX_DIR: "${CLUSTERWEAVE_SMTP_OUTBOX_DIR:-}"
    cpus: "${CLUSTERWEAVE_WORKER_CPU_LIMIT:-4}"
    mem_limit: "${CLUSTERWEAVE_WORKER_MEM_LIMIT:-16g}"
    pids_limit: "${CLUSTERWEAVE_WORKER_PIDS_LIMIT:-8192}"
    shm_size: 512m
    tmpfs:
      - /tmp:size=4g

volumes:
  antismash_db:
    driver: local
  pfam_db:
    driver: local
  job_data:
    driver: local
