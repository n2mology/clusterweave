# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — ClusterWeave Web
#
# Usage:
#   docker compose up --build          # first run (builds image, downloads DBs)
#   docker compose up -d               # subsequent runs (detached)
#   docker compose down                # stop
#   docker compose logs -f web         # tail logs
#
# The web UI is available at http://localhost:8080
#
# On first startup the container downloads:
#   - antiSMASH databases (~5 GB) to the `antismash_db` volume
#   - Pfam-A.hmm (~1 GB) to the `pfam_db` volume
# Both are cached in named Docker volumes and reused on subsequent starts.
# ─────────────────────────────────────────────────────────────────────────────
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: clusterweave-web:latest
    container_name: clusterweave-web
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:8080"
    volumes:
      # Persistent database caches (survive container restarts / rebuilds)
      - antismash_db:/databases/antismash
      - pfam_db:/databases/pfam
      # Persistent job data (uploads and results)
      - job_data:/data
    environment:
      SERVICE_MODE: web
      DATA_DIR: /data
      ANTISMASH_DB_DIR: /databases/antismash
      PFAM_DIR: /databases/pfam
      PORT: "8080"
    mem_limit: 2g
    shm_size: 512m
    tmpfs:
      - /tmp:size=4g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: clusterweave-web:latest
    container_name: clusterweave-worker
    restart: unless-stopped
    volumes:
      - antismash_db:/databases/antismash
      - pfam_db:/databases/pfam
      - job_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
    environment:
      SERVICE_MODE: worker
      DATA_DIR: /data
      ANTISMASH_DB_DIR: /databases/antismash
      PFAM_DIR: /databases/pfam
      WORKER_POLL_SECONDS: "1"
      PREPULL_CLINKER_IMAGE: "1"
      PREPULL_BIGSCAPE_IMAGE: "1"
      BIGSCAPE_USE_DOCKER_IMAGE: "1"
      BIGSCAPE_DOCKER_IMAGE: "ghcr.io/medema-group/big-scape:2.0.0-beta.6"
      BIGSCAPE_DOCKER_DATA_VOLUME: "clusterweave_job_data"
      BIGSCAPE_DOCKER_PFAM_VOLUME: "clusterweave_pfam_db"
      CLINKER_USE_DOCKER_IMAGE: "1"
      CLINKER_DOCKER_IMAGE: "quay.io/biocontainers/clinker-py:0.0.32--pyhdfd78af_0"
      CLINKER_DOCKER_DATA_VOLUME: "clusterweave_job_data"
      PIPELINE_CPUS: "4"
    mem_limit: 16g
    shm_size: 512m
    tmpfs:
      - /tmp:size=4g

volumes:
  antismash_db:
    driver: local
  pfam_db:
    driver: local
  job_data:
    driver: local
